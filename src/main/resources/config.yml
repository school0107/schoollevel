# ==================== BREAKTHROUGH ====================
breakthrough:
  levels:
    200:
      required-money: 10000.0
      commands:
        - "say &6&l✦ &f%player% &6đã đột phá lên cấp 200! 🎉"
        - "effect give %player% minecraft:strength 60 2"
    300:
      required-money: 50000.0
      commands:
        - "say &6&l✦ &f%player% &6đã đột phá lên cấp 300! 🎉"
        - "effect give %player% minecraft:strength 120 3"
    400:
      required-money: 200000.0
      commands:
        - "say &6&l✦ &f%player% &6đã đột phá lên cấp 400! 🎉"
        - "effect give %player% minecraft:strength 180 4"
    500:
