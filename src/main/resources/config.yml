# ======================================================
#              SCHOOLLEVEL PLUGIN CONFIG
#                 RPG Level System v1.0
# ======================================================

# ==================== SETTINGS ====================
settings:
  # Currency settings
  currency:
    # Ký hiệu tiền tệ
    symbol: "💰 "
    # Tên tiền tệ
    name: "coins"
    # Định dạng hiển thị: {symbol}{amount} hoặc {amount} {name}
    format: "{symbol}{amount}"
  
  # Sử dụng Vault Economy (nếu có)
  # Nếu bật, plugin sẽ dùng economy của server (Essentials, CMI, etc.)
  # Nếu tắt, plugin sẽ dùng hệ thống tiền nội bộ
  use-vault-economy: true
  
  # Hiển thị thông báo nhận tiền trên actionbar
  show-money-message: true
  
  # Thời gian hiển thị thông báo nhận tiền (tick, 20 tick = 1 giây)
  money-message-duration: 60
  
  # ===== ACTIONBAR FORMAT =====
  # Các placeholder có thể sử dụng:
  # {level}    - Cấp độ hiện tại
  # {bar}      - Thanh tiến trình (■■■■□□□□□□)
  # {xp}       - XP hiện tại
  # {required} - XP cần để lên cấp
  # {health}   - Máu hiện tại
  # {damage}   - Sát thương hiện tại
  # {money}    - Số tiền hiện tại
  # {pending}  - Tiền vừa nhận được (hiển thị khi có)
  actionbar-format: "&e⚡ &fCấp &6{level} &7| &a{bar} &fXP: &b{xp}/{required} &7| &c❤ {health} &7| &6⚔ {damage} &7| &e💰 {money}{pending}"

