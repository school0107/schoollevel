# ==================== MESSAGES ====================
messages:
  # Tin nhắn khi lên cấp (CHAT)
  level-up-chat: "&6&l⬆ &fBạn đã lên &6Cấp %level%&f! &e✦"
  
  # Tin nhắn khi lên cấp (TITLE)
  level-up-title: "&6&l⬆ LEVEL UP!"
  level-up-subtitle: "&fBạn đã đạt &6Cấp %level%"
  
  # Tin nhắn đột phá (BROADCAST)
  breakthrough: "&6&l✦ &f%player% &6&lĐÃ ĐỘT PHÁ LÊN CẤP 101 HUYỀN THOẠI! ✦"
  
  # Lỗi
  no-permission: "&c❌ Bạn không có quyền sử dụng lệnh này!"
  player-not-found: "&c❌ Không tìm thấy người chơi!"
  breakthrough-already: "&c❌ Bạn đã đột phá rồi!"
  breakthrough-not-ready: "&c❌ Bạn cần đạt &6Cấp 100 &cđể sử dụng!"
  invalid-amount: "&c❌ Số tiền không hợp lệ!"

# ==================== COMMANDS ====================
commands:
  # Lệnh chạy khi lên cấp
  level-up:
    - "say &6&l✦ &f%player% &eđã lên cấp &6%level%&e! Chúc mừng!"
    - "effect give %player% minecraft:glowing 3 1"
    
  # Lệnh chạy khi đột phá
  breakthrough:
    - "say &6&l✦ &f%player% &6&lĐÃ ĐỘT PHÁ GIỚI HẠN! &fCấp 101 HUYỀN THOẠI!"
    - "title %player% title &6&l✦ HUYỀN THOẠI ✦"
    - "title %player% subtitle &eCấp 101 - Sức mạnh vô hạn"
    - "effect give %player% minecraft:strength 60 2"
    - "effect give %player% minecraft:resistance 60 2"
    - "effect give %player% minecraft:speed 60 2"