# ======================================================
#              ✨ SCHOOLLEVEL PLUGIN CONFIG ✨
#                 RPG Level System v1.0
# ======================================================

# ==================== SETTINGS ====================
settings:
  # ===== KINH NGHIỆM =====
  # Hệ số nhân XP mỗi cấp (mặc định 1.1 = tăng 10% mỗi cấp)
  # Công thức: 100 * level^1.5 * multiplier^level
  level-xp-multiplier: 1.1
  
  # ===== TIỀN TỆ =====
  currency:
    # Ký hiệu tiền tệ (có thể dùng emoji)
    symbol: "💰 "
    # Tên tiền tệ
    name: "Xu"
    # Định dạng hiển thị: {symbol}{amount} hoặc {amount} {name}
    format: "{symbol}{amount}"
  
  # ===== KINH TẾ =====
  # Sử dụng Vault Economy (nếu có)
  # Nếu bật, plugin sẽ dùng economy của server (Essentials, CMI, etc.)
  # Nếu tắt, plugin sẽ dùng hệ thống tiền nội bộ
  use-vault-economy: true
  
  # ===== THÔNG BÁO =====
  # Hiển thị thông báo nhận tiền trên actionbar
  show-money-message: true
  
  # Thời gian hiển thị thông báo nhận tiền (tick, 20 tick = 1 giây)
  money-message-duration: 60
  
  # ===== TIỀN ĐÀO BLOCK =====
  # Tiền cơ bản khi đào 1 block (tất cả các loại block)
  base-block-money: 0.1
  
  # Tiền thưởng thêm mỗi cấp khi đào block
  # Ví dụ: level 10 => bonus = 10 * 0.05 = 0.5
  # Tổng tiền nhận được = base-block-money + (level * level-money-bonus)
  level-money-bonus: 0.01
  
  # ===== ACTIONBAR FORMAT =====
  # Các placeholder có thể sử dụng:
  # {level}    - Cấp độ hiện tại
  # {bar}      - Thanh tiến trình (■■■■□□□□□□)
  # {xp}       - XP hiện tại
  # {required} - XP cần để lên cấp
  # {health}   - Máu hiện tại
  # {damage}   - Sát thương hiện tại
  # {money}    - Số tiền hiện tại
  actionbar-format: "&e⚡ &fCấp &6{level} &7| &fXP: &b{xp}/{required} &7| &c❤ {health} &7| &6⚔ {damage} "

