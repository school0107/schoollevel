# ======================================================
#              ✨ SCHOOLLEVEL PLUGIN CONFIG ✨
#                 RPG Level System v1.0
# ======================================================

settings:
  # Cấp tối đa cho phép
  max-level: 500

  # Cấp tối đa mặc định (trước khi đột phá)
  base-max-level: 100  # <--- THÊM DÒNG NÀY
  
  # ... các settings khác giữ nguyên ...
  # Hệ số nhân XP mỗi cấp
  level-xp-multiplier: 1.1
  
  currency:
    symbol: "💰 "
    name: "Xu"
    format: "{symbol}{amount}"
  
  use-vault-economy: true
  show-money-message: true
  money-message-duration: 60
  
  actionbar-format: "&e⚡ &fCấp &6{level} &7| &a{bar} &fXP: &b{xp}/{required} &7| &c❤ {health} &7| &6⚔ {damage} &7| &e💰 {money}"
  
  base-block-money: 0.1
  level-money-bonus: 0.05

  hide-extra-hearts: true
  
  # Số tim hiển thị (mặc định 10 tim = 20 máu)
  visible-hearts: 10

