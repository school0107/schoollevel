name: SchoolLevel
version: ${project.version}
main: com.schoollevel.SchoolLevelPlugin
api-version: "1.21"
author: SchoolLevel
description: RPG Level System with Breakthrough for Minecraft 1.21+
website: https://github.com/yourusername/SchoolLevel

commands:
  profile:
    description: Mở menu thông tin cá nhân
    usage: /profile
    aliases: [schoollevelmenu]
  schoollevel:
    description: Quản lý SchoolLevel
    usage: /schoollevel <reload>
    permission: schoollevel.admin
  schoollevelgiveitem:
    description: Cấp Đá Đột Phá
    usage: /schoollevelgiveitem <player>
    permission: schoollevel.admin

permissions:
  schoollevel.admin:
    description: Admin permissions
    default: op
