name: SchoolLevel
version: ${project.version}
main: me.schoollevel.schoollevel.SchoolLevelPlugin
api-version: "1.21"
author: SchoolLevel
description: ✨ RPG Level System with Breakthrough, Money and Vault Integration
depend: [Vault]
softdepend: [PlaceholderAPI]

commands:
  profile:
    description: 📊 Mở menu thông tin cá nhân
    usage: /profile
    aliases: [schoollevelmenu]
  schoollevel:
    description: ⚙️ Quản lý SchoolLevel
    usage: /schoollevel <reload|giveitem|givecoins|multiplier>
    permission: schoollevel.admin
  schoollevelgiveitem:
    description: 💎 Cấp Đá Đột Phá
    usage: /schoollevelgiveitem <player>
    permission: schoollevel.admin

permissions:
  schoollevel.admin:
    description: 👑 Admin permissions
    default: op
  
  schoollevel.xp.2:
    description: 2x XP khi đào block và giết mob
    default: false
  schoollevel.xp.3:
    description: 3x XP khi đào block và giết mob
    default: false
  schoollevel.xp.4:
    description: 4x XP khi đào block và giết mob
    default: false
  schoollevel.xp.5:
    description: 5x XP khi đào block và giết mob
    default: false
  
  schoollevel.money.2:
    description: 2x Money khi đào block và giết mob
    default: false
  schoollevel.money.3:
    description: 3x Money khi đào block và giết mob
    default: false
  schoollevel.money.4:
    description: 4x Money khi đào block và giết mob
    default: false
  schoollevel.money.5:
    description: 5x Money khi đào block và giết mob
    default: false