name: SchoolLevel
version: ${project.version}
main: me.schoollevel.schoollevel.SchoolLevelPlugin
api-version: "1.21"
author: SchoolLevel
description: ✨ RPG Level System with Breakthrough, Money and Vault Integration
depend: [Vault]
softdepend: [PlaceholderAPI]

commands:
  profile:
    description: 📊 Mở menu thông tin cá nhân
    usage: /profile
    aliases: [schoollevelmenu]
  schoollevel:
    description: ⚙️ Quản lý SchoolLevel
    usage: /schoollevel <reload|giveitem|givecoins|multiplier>
    permission: schoollevel.admin
  schoollevelgiveitem:
    description: 💎 Cấp Đá Đột Phá
    usage: /schoollevelgiveitem <player>
    permission: schoollevel.admin

permissions:
  schoollevel.admin:
    description: 👑 Admin permissions
    default: op
  
  # ===== XP MULTIPLIERS =====
  schoollevel.xp.1.5:
    description: 1.5x XP khi đào block và giết mob
    default: false
  schoollevel.xp.2.0:
    description: 2.0x XP khi đào block và giết mob
    default: false
  schoollevel.xp.2.5:
    description: 2.5x XP khi đào block và giết mob
    default: false
  schoollevel.xp.3.0:
    description: 3.0x XP khi đào block và giết mob
    default: false
  schoollevel.xp.3.5:
    description: 3.5x XP khi đào block và giết mob
    default: false
  schoollevel.xp.4.0:
    description: 4.0x XP khi đào block và giết mob
    default: false
  schoollevel.xp.4.5:
    description: 4.5x XP khi đào block và giết mob
    default: false
  schoollevel.xp.5.0:
    description: 5.0x XP khi đào block và giết mob
    default: false
  schoollevel.xp.5.5:
    description: 5.5x XP khi đào block và giết mob
    default: false
  
  # ===== MONEY MULTIPLIERS =====
  schoollevel.money.1.5:
    description: 1.5x Money khi đào block và giết mob
    default: false
  schoollevel.money.2.0:
    description: 2.0x Money khi đào block và giết mob
    default: false
  schoollevel.money.2.5:
    description: 2.5x Money khi đào block và giết mob
    default: false
  schoollevel.money.3.0:
    description: 3.0x Money khi đào block và giết mob
    default: false
  schoollevel.money.3.5:
    description: 3.5x Money khi đào block và giết mob
    default: false
  schoollevel.money.4.0:
    description: 4.0x Money khi đào block và giết mob
    default: false
  schoollevel.money.4.5:
    description: 4.5x Money khi đào block và giết mob
    default: false