name: Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: |
          mkdir -p target/classes
          javac -cp "$(find ~/.m2/repository/io/papermc/paper -name '*.jar' | head -1)" -d target/classes src/main/java/com/schoolnap/*.java src/main/java/com/schoolnap/**/*.java 2>/dev/null || true
          cp -r src/main/resources/* target/classes/
          cd target/classes && jar cf ../SchoolNap.jar . && cd ../..
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SchoolNap
          path: target/SchoolNap.jar